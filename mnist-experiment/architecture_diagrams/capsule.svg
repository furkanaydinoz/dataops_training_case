<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="convGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capsuleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#0f0f23"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">CapsuleNetwork Architecture</text>
  <text x="450" y="60" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Dynamic Routing • Vector-valued Capsules • ~320K params</text>

  <rect x="30" y="110" width="60" height="60" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="60" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input</text>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">1×28×28</text>

  <path d="M 95 140 L 120 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <rect x="125" y="100" width="80" height="80" rx="8" fill="url(#convGrad)" filter="url(#shadow)"/>
  <text x="165" y="128" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Conv2d</text>
  <text x="165" y="143" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">1→256, 9×9</text>
  <text x="165" y="157" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">+ReLU</text>
  <text x="165" y="175" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">20×20</text>

  <path d="M 210 140 L 235 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="240" y="90" width="110" height="100" rx="10" fill="#2d3748" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="295" y="115" font-family="Arial, sans-serif" font-size="12" fill="#f093fb" text-anchor="middle" font-weight="bold">Primary Caps</text>
  <text x="295" y="132" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Conv2d(256→256×8)</text>
  <text x="295" y="147" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">9×9, stride=2</text>
  <text x="295" y="165" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">8 capsules</text>
  <text x="295" y="180" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">8-dim vectors</text>

  <path d="M 355 140 L 380 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="385" y="90" width="110" height="100" rx="10" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="115" font-family="Arial, sans-serif" font-size="12" fill="#f5576c" text-anchor="middle" font-weight="bold">Capsule L1</text>
  <text x="440" y="132" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">8 caps → 8 caps</text>
  <text x="440" y="147" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">dim=8</text>
  <text x="440" y="165" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">Dynamic</text>
  <text x="440" y="180" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">routing=3</text>

  <path d="M 500 140 L 525 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="530" y="80" width="120" height="120" rx="10" fill="#2d3748" stroke="#ffd700" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="105" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" text-anchor="middle" font-weight="bold">Digit Caps</text>
  <text x="590" y="122" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">512 → 10 capsules</text>
  <text x="590" y="137" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">dim=16</text>
  <text x="590" y="155" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">10 classes</text>
  <text x="590" y="170" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">(digits 0-9)</text>
  <text x="590" y="190" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">routing=3</text>

  <path d="M 655 140 L 680 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="685" y="100" width="90" height="80" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="730" y="128" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Length</text>
  <text x="730" y="143" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">=</text>
  <text x="730" y="158" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Score</text>
  <text x="730" y="175" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">||capsule||</text>

  <rect x="30" y="220" width="380" height="180" rx="10" fill="#16213e" stroke="#f093fb" stroke-width="2"/>
  <text x="220" y="250" font-family="Arial, sans-serif" font-size="14" fill="#f093fb" text-anchor="middle" font-weight="bold">Dynamic Routing Process</text>
  <rect x="60" y="270" width="320" height="110" rx="8" fill="#1e3a5f"/>
  <text x="220" y="295" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">For each parent capsule:</text>
  <text x="220" y="315" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">1. Compute prediction vectors: u_i × W_ij</text>
  <text x="220" y="333" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">2. Agreement = dot(product, prediction)</text>
  <text x="220" y="351" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">3. Update coupling: c_ij = softmax(b_ij + agreement)</text>
  <text x="220" y="369" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">4. Output = weighted sum, then squash</text>

  <rect x="430" y="220" width="440" height="180" rx="10" fill="#1e3a5f" stroke="#38ef7d" stroke-width="2"/>
  <text x="650" y="250" font-family="Arial, sans-serif" font-size="14" fill="#38ef7d" text-anchor="middle" font-weight="bold">Why Vector Capsules?</text>
  <text x="470" y="280" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">CNN Problem:</text>
  <text x="470" y="300" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">MaxPool loses spatial info</text>
  <text x="470" y="315" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">Scalar activations</text>
  <text x="470" y="340" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Capsule Solution:</text>
  <text x="470" y="360" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">Vector = pose (position, rotation)</text>
  <text x="470" y="375" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">Length = activation magnitude</text>
  <text x="470" y="390" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">Direction = instantiation params</text>
  <text x="830" y="280" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Example:</text>
  <text x="830" y="305" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">"3" rotated 45°</text>
  <text x="830" y="320" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">→ same capsule,</text>
  <text x="830" y="335" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">different vector</text>
  <text x="830" y="355" font-family="Arial, sans-serif" font-size="10" fill="#ffd700" text-anchor="middle">Equivariance:</text>
  <text x="830" y="370" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Vector transforms</text>
  <text x="830" y="385" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">with input rotation</text>

</svg>