<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#0f0f23"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">MLP Family Architectures</text>

  <!-- ============ SIMPLE MLP ============ -->
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="16" fill="#4facfe" text-anchor="middle" font-weight="bold">SimpleMLP</text>
  <text x="150" y="115" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">3-Layer Baseline • ~100K params</text>

  <!-- Input -->
  <rect x="20" y="150" width="60" height="60" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="50" y="178" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input</text>
  <text x="50" y="193" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">784</text>

  <!-- Arrow -->
  <path d="M 85 180 L 110 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <!-- FC1 -->
  <rect x="115" y="140" width="80" height="80" rx="8" fill="url(#layerGrad)" filter="url(#shadow)"/>
  <text x="155" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Linear</text>
  <text x="155" y="182" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">784→128</text>
  <text x="155" y="196" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">+ReLU</text>

  <!-- Arrow -->
  <path d="M 200 180 L 225 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- FC2 -->
  <rect x="230" y="150" width="70" height="60" rx="8" fill="url(#layerGrad)" filter="url(#shadow)"/>
  <text x="265" y="173" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Linear</text>
  <text x="265" y="187" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">128→64</text>
  <text x="265" y="201" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">+ReLU</text>

  <!-- Arrow -->
  <path d="M 305 180 L 330 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="335" y="150" width="60" height="60" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="365" y="178" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Linear</text>
  <text x="365" y="193" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">64→10</text>

  <!-- ============ WIDE MLP ============ -->
  <text x="450" y="95" font-family="Arial, sans-serif" font-size="16" fill="#f5576c" text-anchor="middle" font-weight="bold">WideMLP</text>
  <text x="450" y="115" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Wide &amp; Shallow • ~530K params</text>

  <!-- Input -->
  <rect x="320" y="150" width="60" height="60" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="350" y="178" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input</text>
  <text x="350" y="193" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">784</text>

  <!-- Arrow -->
  <path d="M 385 180 L 410 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- FC1 - Wide -->
  <rect x="415" y="130" width="90" height="100" rx="8" fill="#f5576c" filter="url(#shadow)"/>
  <text x="460" y="165" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Linear</text>
  <text x="460" y="180" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">784→512</text>
  <text x="460" y="195" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">+ReLU</text>
  <text x="460" y="215" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">WIDE</text>

  <!-- Arrow -->
  <path d="M 510 180 L 535 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- FC2 - Wide -->
  <rect x="540" y="145" width="80" height="70" rx="8" fill="#f5576c" filter="url(#shadow)"/>
  <text x="580" y="168" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Linear</text>
  <text x="580" y="183" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">512→256</text>
  <text x="580" y="198" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">+ReLU</text>

  <!-- Arrow -->
  <path d="M 625 180 L 650 180" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="655" y="150" width="60" height="60" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="685" y="178" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Linear</text>
  <text x="685" y="193" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">256→10</text>

  <!-- ============ DEEP MLP ============ -->
  <text x="780" y="95" font-family="Arial, sans-serif" font-size="16" fill="#764ba2" text-anchor="middle" font-weight="bold">DeepMLP</text>
  <text x="780" y="115" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Deep &amp; Narrow • ~57K params</text>

  <!-- Input -->
  <rect x="700" y="150" width="50" height="60" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="725" y="178" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Input</text>
  <text x="725" y="193" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">784</text>

  <!-- Arrow -->
  <path d="M 755 180 L 770 180" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- First Layer -->
  <rect x="775" y="150" width="55" height="60" rx="6" fill="url(#layerGrad)" filter="url(#shadow)"/>
  <text x="802" y="175" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Linear</text>
  <text x="802" y="187" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">784→64</text>
  <text x="802" y="199" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">ReLU</text>

  <!-- Arrow to hidden layers -->
  <path d="M 833 180 L 843 180" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Hidden Layers Stack -->
  <rect x="848" y="135" width="35" height="90" rx="4" fill="#2d3748" stroke="#764ba2" stroke-width="1"/>
  <text x="865" y="158" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">×6</text>
  <text x="865" y="170" font-family="Arial, sans-serif" font-size="7" fill="#e0e0e0" text-anchor="middle">64→64</text>
  <text x="865" y="182" font-family="Arial, sans-serif" font-size="7" fill="#90ee90" text-anchor="middle">ReLU</text>
  <text x="865" y="210" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">DEEP</text>

  <!-- Arrow to output -->
  <path d="M 886 180 L 896 180" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output (outside visible area, just示意) -->
  <rect x="30" y="330" width="840" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="450" y="358" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">Summary: SimpleMLP uses minimal width, WideMLP maximizes hidden dimensions, DeepMLP uses depth over width</text>

</svg>