<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mbconvGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#0f0f23"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">EfficientNetStyle Architecture</text>
  <text x="450" y="60" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">MBConv Blocks + Squeeze-Excitation + Swish - ~100K params</text>

  <rect x="30" y="110" width="55" height="55" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="57" y="142" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Input</text>
  <text x="57" y="157" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">1x28x28</text>

  <path d="M 90 137 L 115 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <rect x="120" y="105" width="65" height="65" rx="8" fill="url(#mbconvGrad)" filter="url(#shadow)"/>
  <text x="152" y="130" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Stem</text>
  <text x="152" y="144" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Conv(1-32)</text>
  <text x="152" y="157" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">+BN+Swish</text>
  <text x="152" y="170" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">28x28</text>

  <path d="M 190 137 L 215 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="220" y="100" width="75" height="75" rx="8" fill="#2d3748" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="257" y="120" font-family="Arial, sans-serif" font-size="10" fill="#667eea" text-anchor="middle" font-weight="bold">MBConv1</text>
  <text x="257" y="135" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">32-32, expand=1</text>
  <text x="257" y="150" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Depthwise 3x3</text>
  <text x="257" y="168" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">no SE</text>

  <path d="M 300 137 L 325 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="330" y="100" width="75" height="75" rx="8" fill="#2d3748" stroke="#764ba2" stroke-width="2" filter="url(#shadow)"/>
  <text x="367" y="120" font-family="Arial, sans-serif" font-size="10" fill="#764ba2" text-anchor="middle" font-weight="bold">MBConv6</text>
  <text x="367" y="135" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">32-48, stride=2</text>
  <text x="367" y="150" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">expand=1</text>
  <text x="367" y="168" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">no SE</text>

  <path d="M 410 137 L 435 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="440" y="95" width="85" height="85" rx="8" fill="#2d3748" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="482" y="118" font-family="Arial, sans-serif" font-size="10" fill="#f093fb" text-anchor="middle" font-weight="bold">MBConv6+SE</text>
  <text x="482" y="134" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">48-64, expand=2</text>
  <text x="482" y="148" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Depthwise 3x3</text>
  <text x="482" y="162" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">SE ratio=0.25</text>
  <text x="482" y="175" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">14x14</text>

  <path d="M 530 137 L 555 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="560" y="100" width="75" height="75" rx="8" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="597" y="120" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle" font-weight="bold">MBConv6</text>
  <text x="597" y="135" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">64-96, stride=2</text>
  <text x="597" y="150" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">expand=1</text>
  <text x="597" y="168" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">7x7</text>

  <path d="M 640 137 L 665 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="670" y="100" width="75" height="75" rx="8" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="707" y="120" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle" font-weight="bold">MBConv6</text>
  <text x="707" y="135" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">96-96</text>
  <text x="707" y="150" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">expand=1</text>
  <text x="707" y="168" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">7x7</text>

  <path d="M 750 137 L 775 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="780" y="95" width="80" height="85" rx="8" fill="#2d3748" stroke="#ffd700" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="118" font-family="Arial, sans-serif" font-size="10" fill="#ffd700" text-anchor="middle" font-weight="bold">MBConv6+SE</text>
  <text x="820" y="134" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">96-128, expand=2</text>
  <text x="820" y="148" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Depthwise 3x3</text>
  <text x="820" y="162" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">+SE attention</text>
  <text x="820" y="178" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">7x7</text>

  <path d="M 865 137 L 880 137" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <rect x="30" y="210" width="840" height="60" rx="8" fill="#16213e" stroke="#38ef7d" stroke-width="1"/>
  <text x="450" y="240" font-family="Arial, sans-serif" font-size="12" fill="#38ef7d" text-anchor="middle">- AdaptiveAvgPool2d(1) - Flatten - Linear(128-10)</text>

  <rect x="30" y="290" width="400" height="115" rx="10" fill="#16213e" stroke="#f093fb" stroke-width="2"/>
  <text x="230" y="315" font-family="Arial, sans-serif" font-size="14" fill="#f093fb" text-anchor="middle" font-weight="bold">MBConv Block (Mobile Inverted Bottleneck)</text>

  <rect x="55" y="330" width="60" height="55" rx="6" fill="url(#mbconvGrad)"/>
  <text x="85" y="355" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Conv1x1</text>
  <text x="85" y="368" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">expand</text>
  <text x="85" y="380" font-family="Arial, sans-serif" font-size="7" fill="#ffd700" text-anchor="middle">C-6C</text>

  <path d="M 120 357 L 140 357" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="145" y="330" width="60" height="55" rx="6" fill="#764ba2"/>
  <text x="175" y="355" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Depthwise</text>
  <text x="175" y="368" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Conv 3x3</text>
  <text x="175" y="380" font-family="Arial, sans-serif" font-size="7" fill="#ffd700" text-anchor="middle">spatial</text>

  <path d="M 210 357 L 230 357" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="235" y="330" width="60" height="55" rx="6" fill="url(#seGrad)"/>
  <text x="265" y="355" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">SE Block</text>
  <text x="265" y="368" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">channel</text>
  <text x="265" y="380" font-family="Arial, sans-serif" font-size="7" fill="#ffd700" text-anchor="middle">attention</text>

  <path d="M 300 357 L 320 357" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="325" y="330" width="60" height="55" rx="6" fill="url(#outputGrad)"/>
  <text x="355" y="355" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">Conv1x1</text>
  <text x="355" y="368" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">project</text>
  <text x="355" y="380" font-family="Arial, sans-serif" font-size="7" fill="#0f0f23" text-anchor="middle">6C-C</text>

  <text x="400" y="357" font-family="Arial, sans-serif" font-size="12" fill="#ffd700" text-anchor="middle">+</text>
  <rect x="410" y="335" width="15" height="45" rx="3" fill="#38ef7d" opacity="0.6"/>

  <rect x="450" y="290" width="420" height="115" rx="10" fill="#1e3a5f" stroke="#f5576c" stroke-width="2"/>
  <text x="660" y="315" font-family="Arial, sans-serif" font-size="14" fill="#f5576c" text-anchor="middle" font-weight="bold">SE Block (Squeeze-Excitation)</text>

  <rect x="475" y="335" width="70" height="50" rx="6" fill="#667eea"/>
  <text x="510" y="358" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Input</text>
  <text x="510" y="372" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">C channels</text>

  <path d="M 550 360 L 575 360" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="580" y="340" width="70" height="40" rx="6" fill="#764ba2"/>
  <text x="615" y="358" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Global</text>
  <text x="615" y="370" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">AvgPool</text>
  <text x="615" y="382" font-family="Arial, sans-serif" font-size="7" fill="#ffd700" text-anchor="middle">HxW-1x1</text>

  <path d="M 655 360 L 680 360" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="685" y="340" width="70" height="40" rx="6" fill="#f5576c"/>
  <text x="720" y="355" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">FC-Swish</text>
  <text x="720" y="367" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">C - C/4</text>
  <text x="720" y="382" font-family="Arial, sans-serif" font-size="7" fill="#ffd700" text-anchor="middle">squeeze</text>

  <path d="M 760 360 L 785 360" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="790" y="340" width="70" height="40" rx="6" fill="#38ef7d"/>
  <text x="825" y="355" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">FC-Sigmoid</text>
  <text x="825" y="367" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">C/4 - C</text>
  <text x="825" y="382" font-family="Arial, sans-serif" font-size="7" fill="#0f0f23" text-anchor="middle">excite</text>

  <path d="M 790 380 L 790 395 L 510 395 L 510 380" stroke="#f5576c" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <text x="650" y="408" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">x (scale) - Input</text>

</svg>