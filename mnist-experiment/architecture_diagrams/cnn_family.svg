<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 450">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="convGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="depthwiseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="950" height="450" fill="#0f0f23"/>
  <text x="475" y="35" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">CNN Family Architectures</text>

  <!-- ============ BASIC CNN ============ -->
  <text x="160" y="80" font-family="Arial, sans-serif" font-size="16" fill="#4facfe" text-anchor="middle" font-weight="bold">BasicCNN</text>
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Classic 2-Layer • ~110K params</text>

  <!-- Input -->
  <rect x="20" y="130" width="55" height="55" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="47" y="162" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">28×28</text>
  <text x="47" y="175" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">×1</text>

  <path d="M 80 157 L 100 157" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#f5576c"/>
  </marker></defs>

  <!-- Conv1 -->
  <rect x="105" y="125" width="65" height="65" rx="6" fill="url(#convGrad)" filter="url(#shadow)"/>
  <text x="137" y="150" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Conv2d</text>
  <text x="137" y="163" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">1→32, 3×3</text>
  <text x="137" y="176" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">+ReLU</text>

  <path d="M 175 157 L 195 157" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool1 -->
  <rect x="200" y="135" width="50" height="45" rx="6" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="225" y="155" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">MaxPool</text>
  <text x="225" y="168" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">2×2</text>
  <text x="225" y="178" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">14×14</text>

  <path d="M 255 157 L 275 157" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Conv2 -->
  <rect x="280" y="125" width="65" height="65" rx="6" fill="url(#convGrad)" filter="url(#shadow)"/>
  <text x="312" y="150" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Conv2d</text>
  <text x="312" y="163" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">32→64, 3×3</text>
  <text x="312" y="176" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">+ReLU</text>

  <path d="M 350 157 L 370 157" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool2 -->
  <rect x="375" y="135" width="50" height="45" rx="6" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="400" y="155" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">MaxPool</text>
  <text x="400" y="168" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">2×2</text>
  <text x="400" y="178" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">7×7</text>

  <path d="M 430 157 L 450 157" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Flatten + FC -->
  <rect x="455" y="125" width="60" height="65" rx="6" fill="#f5af19" filter="url(#shadow)"/>
  <text x="485" y="148" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">Flatten</text>
  <text x="485" y="160" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">64×7×7</text>
  <text x="485" y="172" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">=3136</text>
  <text x="485" y="185" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">→FC→10</text>

  <!-- ============ DEPTHWISE CNN ============ -->
  <text x="475" y="240" font-family="Arial, sans-serif" font-size="16" fill="#11998e" text-anchor="middle" font-weight="bold">DepthwiseCNN</text>
  <text x="475" y="260" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Separable Convolutions • ~10K params (lightest)</text>

  <!-- Input -->
  <rect x="30" y="290" width="55" height="55" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="57" y="322" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">28×28</text>
  <text x="57" y="335" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">×1</text>

  <path d="M 90 317 L 115 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Depthwise Block 1 -->
  <rect x="120" y="275" width="110" height="85" rx="8" fill="#2d3748" stroke="#11998e" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="300" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Depthwise</text>
  <text x="175" y="313" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Conv(1→1, 3×3)</text>
  <text x="175" y="326" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">Pointwise</text>
  <text x="175" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Conv(1→16) + ReLU</text>
  <text x="175" y="353" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">Depthwise Separable</text>

  <path d="M 235 317 L 260 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool1 -->
  <rect x="265" y="295" width="50" height="45" rx="6" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="290" y="315" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">MaxPool</text>
  <text x="290" y="328" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">2×2</text>
  <text x="290" y="338" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">14×14</text>

  <path d="M 320 317 L 345 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Depthwise Block 2 -->
  <rect x="350" y="275" width="110" height="85" rx="8" fill="#2d3748" stroke="#11998e" stroke-width="2" filter="url(#shadow)"/>
  <text x="405" y="300" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Depthwise</text>
  <text x="405" y="313" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Conv(16→16, 3×3)</text>
  <text x="405" y="326" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">Pointwise</text>
  <text x="405" y="338" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Conv(16→32) + ReLU</text>
  <text x="405" y="353" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">Separable Conv</text>

  <path d="M 465 317 L 490 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool2 -->
  <rect x="495" y="295" width="50" height="45" rx="6" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="520" y="315" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">MaxPool</text>
  <text x="520" y="328" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">2×2</text>
  <text x="520" y="338" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">7×7</text>

  <path d="M 550 317 L 575 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- FC -->
  <rect x="580" y="290" width="60" height="55" rx="6" fill="url(#depthwiseGrad)" filter="url(#shadow)"/>
  <text x="610" y="312" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">Linear</text>
  <text x="610" y="325" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">1568→64</text>
  <text x="610" y="338" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">→64→10</text>

  <!-- ============ EFFICIENT CNN ============ -->
  <text x="810" y="240" font-family="Arial, sans-serif" font-size="16" fill="#f5576c" text-anchor="middle" font-weight="bold">EfficientCNN</text>
  <text x="810" y="260" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Compound Scaling • ~80K params</text>

  <!-- Input -->
  <rect x="670" y="290" width="55" height="55" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="697" y="322" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">28×28</text>
  <text x="697" y="335" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">×1</text>

  <path d="M 730 317 L 755 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Efficient Block 1 -->
  <rect x="760" y="280" width="100" height="75" rx="8" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="810" y="302" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Conv(1→32)</text>
  <text x="810" y="315" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">Depthwise(32→32)</text>
  <text x="810" y="328" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Pointwise(32→64)</text>
  <text x="810" y="345" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">Efficient Block</text>

  <path d="M 865 317 L 885 317" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pool -->
  <rect x="890" y="295" width="45" height="45" rx="6" fill="url(#poolGrad)" filter="url(#shadow)"/>
  <text x="912" y="315" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">Pool</text>
  <text x="912" y="327" font-family="Arial, sans-serif" font-size="8" fill="#0f0f23" text-anchor="middle">14×14</text>

  <!-- Summary -->
  <rect x="30" y="400" width="890" height="40" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="475" y="426" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Key Difference: Standard Conv vs Depthwise Separable (fewer params) vs Compound Scaling (balanced)</text>

</svg>