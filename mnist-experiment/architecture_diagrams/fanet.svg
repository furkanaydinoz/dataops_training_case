<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 500">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cnnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="attnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="950" height="500" fill="#0f0f23"/>

  <!-- Title -->
  <text x="475" y="35" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold">
    FANET - Feature Adaptive Network with Enhanced Transformers
  </text>
  <text x="475" y="60" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">
    Hybrid CNN + Transformer Architecture
  </text>

  <!-- ============ MAIN PIPELINE ============ -->

  <!-- Input -->
  <rect x="20" y="120" width="70" height="70" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="55" y="155" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input</text>
  <text x="55" y="172" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">28×28×1</text>

  <path d="M 95 155 L 125 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <!-- MultiScaleCNNStem -->
  <rect x="130" y="95" width="160" height="120" rx="10" fill="#2d3748" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="125" font-family="Arial, sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">MultiScaleCNNStem</text>

  <!-- CNN Stages -->
  <rect x="145" y="140" width="40" height="55" rx="4" fill="url(#cnnGrad)"/>
  <text x="165" y="162" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DWConv</text>
  <text x="165" y="175" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">1→32</text>
  <text x="165" y="187" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">stride2</text>

  <path d="M 190 167 L 210 167" stroke="#f5576c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="215" y="140" width="40" height="55" rx="4" fill="url(#cnnGrad)"/>
  <text x="235" y="162" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DWConv</text>
  <text x="235" y="175" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">32→64</text>
  <text x="235" y="187" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">stride2</text>

  <path d="M 260 167 L 280 167" stroke="#f5576c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="285" y="140" width="40" height="55" rx="4" fill="url(#cnnGrad)"/>
  <text x="305" y="162" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">DWConv</text>
  <text x="305" y="175" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">64→128</text>
  <text x="305" y="187" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">stride2</text>

  <path d="M 295 155 L 325 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Feature to Sequence + Pos Embed -->
  <rect x="330" y="110" width="80" height="80" rx="8" fill="#1e3a5f" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="145" font-family="Arial, sans-serif" font-size="11" fill="#f093fb" text-anchor="middle" font-weight="bold">Flatten</text>
  <text x="370" y="162" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">4×4→16</text>
  <text x="370" y="177" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">+Pos Emb</text>

  <path d="M 415 155 L 445 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Transformer Blocks Stack -->
  <rect x="450" y="95" width="180" height="120" rx="10" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="120" font-family="Arial, sans-serif" font-size="14" fill="#f5576c" text-anchor="middle" font-weight="bold">HybridConvTransformer × 3</text>

  <!-- Block 1 -->
  <rect x="465" y="135" width="65" height="60" rx="6" fill="url(#attnGrad)"/>
  <text x="497" y="158" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">ConvAttn</text>
  <text x="497" y="172" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">QKV: DWConv</text>
  <text x="497" y="184" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">Local+Global</text>

  <path d="M 535 165 L 550 165" stroke="#fff" stroke-width="1.5"/>

  <rect x="555" y="135" width="60" height="60" rx="6" fill="#764ba2"/>
  <text x="585" y="158" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">FFN</text>
  <text x="585" y="172" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">GELU</text>
  <text x="585" y="184" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">4× expand</text>

  <!-- Plus signs for residuals -->
  <text x="540" y="165" font-family="Arial, sans-serif" font-size="14" fill="#38ef7d" text-anchor="middle">+</text>

  <!-- Block 2 and 3 indicators -->
  <text x="540" y="205" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">× 3 blocks total</text>

  <path d="M 635 155 L 665 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Global AvgPool -->
  <rect x="670" y="115" width="70" height="80" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="705" y="150" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Global</text>
  <text x="705" y="165" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">AvgPool</text>
  <text x="705" y="185" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">16→1</text>

  <path d="M 745 155 L 775 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="780" y="125" width="60" height="60" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="810" y="155" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Linear</text>
  <text x="810" y="172" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">128→10</text>

  <!-- Output arrow -->
  <path d="M 845 155 L 875 155" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- ============ COMPARISON TABLE ============ -->
  <rect x="20" y="260" width="450" height="220" rx="10" fill="#16213e" stroke="#667eea" stroke-width="2"/>
  <text x="245" y="290" font-family="Arial, sans-serif" font-size="16" fill="#667eea" text-anchor="middle" font-weight="bold">FANET vs ViT vs CNN</text>

  <!-- Table headers -->
  <rect x="40" y="305" width="120" height="25" rx="4" fill="#4facfe"/>
  <text x="100" y="323" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Aspect</text>

  <rect x="160" y="305" width="95" height="25" rx="4" fill="#f5576c"/>
  <text x="207" y="323" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">ViT</text>

  <rect x="255" y="305" width="95" height="25" rx="4" fill="#11998e"/>
  <text x="302" y="323" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">CNN</text>

  <rect x="350" y="305" width="100" height="25" rx="4" fill="#ffd700"/>
  <text x="400" y="323" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">FANET</text>

  <!-- Row 1 -->
  <text x="100" y="350" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Feature Extract</text>
  <text x="207" y="350" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Linear proj</text>
  <text x="302" y="350" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Conv layers</text>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">DWConv stages</text>

  <!-- Row 2 -->
  <text x="100" y="380" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Attention</text>
  <text x="207" y="380" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Pure global</text>
  <text x="302" y="380" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">N/A</text>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Local + Global</text>

  <!-- Row 3 -->
  <text x="100" y="410" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Inductive Bias</text>
  <text x="207" y="410" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">None</text>
  <text x="302" y="410" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Locality</text>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Local + Learnable</text>

  <!-- Row 4 -->
  <text x="100" y="440" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Pos Encoding</text>
  <text x="207" y="440" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">1D Learnable</text>
  <text x="302" y="440" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Spatial</text>
  <text x="400" y="440" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">2D + Spatial</text>

  <!-- Row 5 -->
  <text x="100" y="465" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Data Efficiency</text>
  <text x="207" y="465" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Needs more</text>
  <text x="302" y="465" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Good</text>
  <text x="400" y="465" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Intermediate</text>

  <!-- ============ KEY INNOVATION ============ -->
  <rect x="490" y="260" width="440" height="220" rx="10" fill="#1e3a5f" stroke="#f093fb" stroke-width="2"/>
  <text x="710" y="290" font-family="Arial, sans-serif" font-size="16" fill="#f093fb" text-anchor="middle" font-weight="bold">Key Innovation: Convolutional QKV</text>

  <!-- Standard vs Convolutional comparison -->
  <rect x="510" y="310" width="180" height="100" rx="8" fill="#2d3748" stroke="#f5576c" stroke-width="1"/>
  <text x="600" y="335" font-family="Arial, sans-serif" font-size="11" fill="#f5576c" text-anchor="middle" font-weight="bold">Standard MHSA</text>
  <text x="600" y="358" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Q = X @ W_q (linear)</text>
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">K = X @ W_k (linear)</text>
  <text x="600" y="392" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">V = X @ W_v (linear)</text>
  <text x="600" y="412" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">No local structure</text>

  <path d="M 700 360 L 720 360" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="730" y="310" width="180" height="100" rx="8" fill="#2d3748" stroke="#38ef7d" stroke-width="1"/>
  <text x="820" y="335" font-family="Arial, sans-serif" font-size="11" fill="#38ef7d" text-anchor="middle" font-weight="bold">FANET MHSA</text>
  <text x="820" y="358" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Q = DWConv(X) (depthwise)</text>
  <text x="820" y="375" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">K = DWConv(X) (depthwise)</text>
  <text x="820" y="392" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">V = DWConv(X) (depthwise)</text>
  <text x="820" y="412" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Local receptive field!</text>

  <!-- Summary -->
  <text x="710" y="450" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">
    CNN's locality + Transformer's global attention = FANET's hybrid strength
  </text>
  <text x="710" y="470" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">
    Parameters: ~80K | Depth: 3 | Heads: 4 | embed_dim: 128
  </text>

</svg>