<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="patchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="transformerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#0f0f23"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">MiniViT Architecture</text>
  <text x="450" y="60" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Vision Transformer with Self-Attention • ~40K params</text>

  <!-- Input Image -->
  <rect x="30" y="100" width="80" height="80" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="70" y="138" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Input</text>
  <text x="70" y="152" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">1×28×28</text>

  <path d="M 115 140 L 145 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <!-- Patch Embedding -->
  <rect x="150" y="90" width="120" height="100" rx="10" fill="#2d3748" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="115" font-family="Arial, sans-serif" font-size="12" fill="#667eea" text-anchor="middle" font-weight="bold">Patch Embedding</text>
  <text x="210" y="132" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Conv2d(1→64, kernel=7, stride=7)</text>

  <!-- Patch Grid Visualization -->
  <rect x="165" y="145" width="100" height="35" rx="4" fill="#1e3a5f"/>
  <text x="215" y="160" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">4×4 = 16 patches</text>
  <text x="215" y="173" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">each 7×7 → 64-dim</text>

  <path d="M 275 140 L 300 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Positional Embedding -->
  <rect x="305" y="100" width="100" height="80" rx="8" fill="url(#patchGrad)" filter="url(#shadow)"/>
  <text x="355" y="130" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Add Positional</text>
  <text x="355" y="146" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Embedding</text>
  <text x="355" y="165" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">Learnable 1D pos</text>

  <path d="M 410 140 L 435 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Transformer Blocks -->
  <rect x="440" y="80" width="160" height="120" rx="10" fill="#2d3748" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="105" font-family="Arial, sans-serif" font-size="12" fill="#f093fb" text-anchor="middle" font-weight="bold">Transformer Block × 2</text>

  <!-- Layer Norm + MHSA -->
  <rect x="455" y="115" width="130" height="35" rx="4" fill="url(#transformerGrad)"/>
  <text x="520" y="135" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">LayerNorm → MultiHeadAttn(4 heads)</text>

  <!-- MLP -->
  <rect x="455" y="155" width="130" height="35" rx="4" fill="#764ba2"/>
  <text x="520" y="175" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">LayerNorm → MLP(GELU)</text>

  <!-- Self-attention visualization -->
  <rect x="620" y="90" width="100" height="100" rx="8" fill="#16213e" stroke="#f5576c" stroke-width="1"/>
  <text x="670" y="110" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">Self-Attention</text>
  <text x="670" y="130" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Each patch attends</text>
  <text x="670" y="145" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">to ALL other patches</text>
  <text x="670" y="165" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">Global context</text>

  <path d="M 605 140 L 615 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <path d="M 725 140 L 750 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Mean Pool + Output -->
  <rect x="755" y="100" width="115" height="80" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="812" y="125" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Mean Pooling</text>
  <text x="812" y="142" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">over 16 patches</text>
  <text x="812" y="162" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">→ Linear(64→10)</text>

  <!-- ============ ATTENTION DETAIL ============ -->
  <rect x="30" y="220" width="400" height="180" rx="10" fill="#16213e" stroke="#667eea" stroke-width="2"/>
  <text x="230" y="250" font-family="Arial, sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">Patch-to-Patch Attention</text>

  <!-- 4x4 grid of patches with attention lines -->
  <rect x="60" y="270" width="30" height="30" rx="3" fill="#4facfe"/>
  <text x="75" y="290" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">P0</text>

  <rect x="100" y="270" width="30" height="30" rx="3" fill="#667eea"/>
  <text x="115" y="290" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">P1</text>

  <rect x="140" y="270" width="30" height="30" rx="3" fill="#764ba2"/>
  <text x="155" y="290" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">P2</text>

  <rect x="180" y="270" width="30" height="30" rx="3" fill="#f093fb"/>
  <text x="195" y="290" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">P3</text>

  <!-- Attention lines from P0 to others -->
  <path d="M 90 280 L 100 280" stroke="#f5576c" stroke-width="1.5" stroke-opacity="0.7"/>
  <path d="M 90 285 L 140 285" stroke="#f5576c" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M 90 290 L 180 290" stroke="#f5576c" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Attention matrix -->
  <rect x="240" y="270" width="170" height="100" rx="6" fill="#1e3a5f"/>
  <text x="325" y="290" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Attention Weights (from P0)</text>
  <rect x="255" y="300" width="140" height="55" rx="4" fill="#0f0f23"/>
  <text x="325" y="320" font-family="Arial, sans-serif" font-size="8" fill="#90ee90" text-anchor="middle">P0→P0: high, P0→P1: med, P0→P2: low</text>
  <text x="325" y="335" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Query-Key-Value projections</text>
  <text x="325" y="350" font-family="Arial, sans-serif" font-size="8" fill="#e0e0e0" text-anchor="middle">Softmax(QK^T / sqrt(d_k)) @ V</text>

  <!-- ============ COMPARISON ============ -->
  <rect x="450" y="220" width="420" height="180" rx="10" fill="#1e3a5f" stroke="#38ef7d" stroke-width="2"/>
  <text x="660" y="250" font-family="Arial, sans-serif" font-size="14" fill="#38ef7d" text-anchor="middle" font-weight="bold">ViT vs CNN: Key Differences</text>

  <text x="480" y="280" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">CNN</text>
  <text x="480" y="300" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Local receptive field</text>
  <text x="480" y="314" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Translation equivariance</text>
  <text x="480" y="328" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Hierarchical features</text>
  <text x="480" y="350" font-family="Arial, sans-serif" font-size="9" fill="#f5576c" text-anchor="middle">Inductive: locality</text>

  <text x="840" y="280" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">ViT</text>
  <text x="840" y="300" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Global attention</text>
  <text x="840" y="314" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">No spatial bias</text>
  <text x="840" y="328" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Needs more data</text>
  <text x="840" y="350" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">Inductive: similarity</text>

  <path d="M 520 310 L 790 310" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>

</svg>