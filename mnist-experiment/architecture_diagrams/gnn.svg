<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="messageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#0f0f23"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle" font-weight="bold">TinyGNN Architecture</text>
  <text x="450" y="60" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Graph Neural Network with Message Passing • ~50K params</text>

  <!-- Input -->
  <rect x="30" y="110" width="60" height="60" rx="8" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="60" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input</text>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">1×28×28</text>

  <path d="M 95 140 L 120 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
  </marker></defs>

  <!-- Unfold to Patches -->
  <rect x="125" y="100" width="90" height="80" rx="8" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="170" y="128" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Unfold</text>
  <text x="170" y="143" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">kernel=9, stride=9</text>
  <text x="170" y="157" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">→ 9 patches</text>
  <text x="170" y="175" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">each 9×9=81</text>

  <path d="M 220 140 L 245 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Node Embedding -->
  <rect x="250" y="100" width="90" height="80" rx="8" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="295" y="128" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Node</text>
  <text x="295" y="143" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Embedding</text>
  <text x="295" y="160" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Linear(81→64)</text>
  <text x="295" y="175" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">9 nodes, 64-dim</text>

  <path d="M 345 140 L 370 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Message Passing Layer 1 -->
  <rect x="375" y="90" width="100" height="100" rx="10" fill="#2d3748" stroke="#f093fb" stroke-width="2" filter="url(#shadow)"/>
  <text x="425" y="115" font-family="Arial, sans-serif" font-size="12" fill="#f093fb" text-anchor="middle" font-weight="bold">MP Layer 1</text>
  <text x="425" y="132" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Message: Linear(128→64)</text>
  <text x="425" y="147" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Update: Linear(128→64)</text>
  <text x="425" y="165" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">Mean aggregate</text>
  <text x="425" y="182" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">+Residual</text>

  <path d="M 480 140 L 505 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Message Passing Layer 2 -->
  <rect x="510" y="90" width="100" height="100" rx="10" fill="#2d3748" stroke="#f5576c" stroke-width="2" filter="url(#shadow)"/>
  <text x="560" y="115" font-family="Arial, sans-serif" font-size="12" fill="#f5576c" text-anchor="middle" font-weight="bold">MP Layer 2</text>
  <text x="560" y="132" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">Same structure</text>
  <text x="560" y="147" font-family="Arial, sans-serif" font-size="9" fill="#e0e0e0" text-anchor="middle">as Layer 1</text>
  <text x="560" y="165" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">Refine node</text>
  <text x="560" y="182" font-family="Arial, sans-serif" font-size="8" fill="#ffd700" text-anchor="middle">features</text>

  <path d="M 615 140 L 640 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Mean Pool -->
  <rect x="645" y="110" width="70" height="60" rx="8" fill="url(#messageGrad)" filter="url(#shadow)"/>
  <text x="680" y="138" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Mean</text>
  <text x="680" y="153" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Pool</text>
  <text x="680" y="168" font-family="Arial, sans-serif" font-size="9" fill="#ffd700" text-anchor="middle">9→1</text>

  <path d="M 720 140 L 745 140" stroke="#f5576c" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Classifier -->
  <rect x="750" y="100" width="100" height="80" rx="8" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="800" y="128" font-family="Arial, sans-serif" font-size="11" fill="#0f0f23" text-anchor="middle">Classifier</text>
  <text x="800" y="145" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">Linear(64→32)</text>
  <text x="800" y="158" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">→ReLU</text>
  <text x="800" y="173" font-family="Arial, sans-serif" font-size="9" fill="#0f0f23" text-anchor="middle">→Linear(32→10)</text>

  <!-- ============ GRAPH STRUCTURE ============ -->
  <rect x="30" y="220" width="350" height="180" rx="10" fill="#16213e" stroke="#667eea" stroke-width="2"/>
  <text x="205" y="250" font-family="Arial, sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="bold">3×3 Grid Graph Structure</text>

  <!-- Node grid visualization -->
  <circle cx="100" cy="300" r="20" fill="#4facfe"/>
  <text x="100" y="305" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">0</text>

  <circle cx="155" cy="300" r="20" fill="#667eea"/>
  <text x="155" y="305" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">1</text>

  <circle cx="210" cy="300" r="20" fill="#764ba2"/>
  <text x="210" y="305" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">2</text>

  <circle cx="100" cy="355" r="20" fill="#f093fb"/>
  <text x="100" y="360" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">3</text>

  <circle cx="155" cy="355" r="20" fill="#f5576c"/>
  <text x="155" y="360" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">4</text>

  <circle cx="210" cy="355" r="20" fill="#f5af19"/>
  <text x="210" y="360" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">5</text>

  <circle cx="100" cy="280" r="20" fill="#38ef7d"/>
  <text x="100" y="285" font-family="Arial, sans-serif" font-size="10" fill="#0f0f23" text-anchor="middle">6</text>

  <circle cx="155" cy="280" r="20" fill="#11998e"/>
  <text x="155" y="285" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">7</text>

  <circle cx="210" cy="280" r="20" fill="#4facfe"/>
  <text x="210" y="285" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">8</text>

  <!-- Edges -->
  <line x1="120" y1="300" x2="135" y2="300" stroke="#ffd700" stroke-width="2"/>
  <line x1="175" y1="300" x2="190" y2="300" stroke="#ffd700" stroke-width="2"/>
  <line x1="120" y1="355" x2="135" y2="355" stroke="#ffd700" stroke-width="2"/>
  <line x1="175" y1="355" x2="190" y2="355" stroke="#ffd700" stroke-width="2"/>
  <line x1="100" y1="320" x2="100" y2="335" stroke="#ffd700" stroke-width="2"/>
  <line x1="155" y1="320" x2="155" y2="335" stroke="#ffd700" stroke-width="2"/>
  <line x1="210" y1="320" x2="210" y2="335" stroke="#ffd700" stroke-width="2"/>
  <line x1="100" y1="300" x2="135" y2="335" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="300" x2="175" y2="335" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="300" y="315" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Each node</text>
  <text x="300" y="330" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">connects to</text>
  <text x="300" y="345" font-family="Arial, sans-serif" font-size="10" fill="#90ee90" text-anchor="middle">neighbors</text>

  <!-- ============ MESSAGE PASSING DETAIL ============ -->
  <rect x="400" y="220" width="470" height="180" rx="10" fill="#1e3a5f" stroke="#f5576c" stroke-width="2"/>
  <text x="635" y="250" font-family="Arial, sans-serif" font-size="14" fill="#f5576c" text-anchor="middle" font-weight="bold">Message Passing Process</text>

  <rect x="430" y="270" width="180" height="110" rx="8" fill="#2d3748" stroke="#38ef7d" stroke-width="1"/>
  <text x="520" y="295" font-family="Arial, sans-serif" font-size="11" fill="#38ef7d" text-anchor="middle">For Node 4:</text>
  <text x="520" y="315" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Neighbors: {1,3,5,7}</text>
  <text x="520" y="335" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Messages from each:</text>
  <text x="520" y="352" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">concat(node_4, neighbor)</text>
  <text x="520" y="368" font-family="Arial, sans-serif" font-size="9" fill="#90ee90" text-anchor="middle">→ Linear → ReLU</text>

  <rect x="630" y="270" width="220" height="110" rx="8" fill="#2d3748" stroke="#ffd700" stroke-width="1"/>
  <text x="740" y="295" font-family="Arial, sans-serif" font-size="11" fill="#ffd700" text-anchor="middle">Update:</text>
  <text x="740" y="315" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">Aggregate messages (mean)</text>
  <text x="740" y="335" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" text-anchor="middle">concat(node, aggregate)</text>
  <text x="740" y="352" font-family="Arial, sans-serif" font-size="9" fill="#f5576c" text-anchor="middle">→ Linear → ReLU</text>
  <text x="740" y="368" font-family="Arial, sans-serif" font-size="9" fill="#f5576c" text-anchor="middle">node = node + updated (residual)</text>

  <text x="635" y="400" font-family="Arial, sans-serif" font-size="10" fill="#888" text-anchor="middle">Key: Graph structure defines communication pattern, not spatial proximity</text>

</svg>